<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD 演示项目</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .version {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
        }
        .success {
            color: #28a745;
            font-size: 48px;
            margin: 20px 0;
        }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">&#9989;</div>
        <h1>CI/CD 部署成功！</h1>
        <div class="version">Version 1.0 - 初始版本</div>
        
        <div class="info">
            <strong>学号：</strong>2024001<br>
            <strong>姓名：</strong>张三<br>
            <strong>班级：</strong>软件工程1班
        </div>
        
        <div class="info">
            <strong>部署信息：</strong><br>
            部署时间：2026-05-17<br>
            环境：Development<br>
            状态：运行正常
        </div>
        
        <div class="footer">
            <p>本项目演示 CI/CD 全流程自动化部署</p>
            <p>使用 GitHub Actions 实现持续集成与持续部署</p>
        </div>
    </div>
</body>
</html>
