name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    # 构建项目
    - name: Build project
      run: |
        echo "Building project..."
        mkdir -p dist
        cp index.html dist/
        cp README.md dist/
        echo "Build completed!"
    
    # 运行测试（模拟）
    - name: Run tests
      run: |
        echo "Running tests..."
        echo "All tests passed!"
    
    # 设置 GitHub Pages
    - name: Setup Pages
      uses: actions/configure-pages@v5
    
    # 上传构建产物
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
    
    # 部署到 GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
